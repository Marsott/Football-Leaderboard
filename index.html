<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Βαθμολογία Πρωταθλήματος</h1>

        <div class="controls">
            <div class="control-group">
                <label for="leagueSelect">Επιλέξτε Πρωτάθλημα:</label>
                <select id="leagueSelect">
                    <option value="league1">Super League</option>
                    <option value="league2">Premier League</option>
                </select>
            </div>

            <div class="control-group" id="groupControl">
                <label for="groupSelect">Επιλέξτε Όμιλο:</label>
                <select id="groupSelect"></select>
            </div>
        </div>

        <div id="standings-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
